<div class="filter-bar" style="justify-content:space-between;">
    <div style="display:flex; gap:12px; flex-wrap:wrap;">
        <input type="text" class="filter-input" id="wlSearch" placeholder="Поиск по номеру или имени...">
        <button class="btn" id="wlSearchBtn">🔍 Поиск</button>
    </div>
    <button class="btn" id="wlAddBtn">+ Добавить номер</button>
</div>

<!-- Форма добавления -->
<div id="wlAddForm" style="display:none; background:#12151c; border:1px solid rgba(255,255,255,0.07); border-radius:16px; padding:24px; margin-bottom:24px;">
    <h3 style="margin-bottom:16px; font-size:15px;">Добавить в белый список</h3>
    <div style="display:flex; gap:12px; flex-wrap:wrap; align-items:flex-end;">
        <div>
            <div style="font-size:12px; color:#6b7280; margin-bottom:6px;">Гос. номер</div>
            <input type="text" class="filter-input" id="wlPlateInput" placeholder="Напр. A001AA27" style="text-transform:uppercase;">
        </div>
        <div>
            <div style="font-size:12px; color:#6b7280; margin-bottom:6px;">Владелец / Комментарий</div>
            <input type="text" class="filter-input" id="wlOwnerInput" placeholder="Напр. Иванов И.И.">
        </div>
        <div>
            <div style="font-size:12px; color:#6b7280; margin-bottom:6px;">Тип</div>
            <select class="filter-select" id="wlTypeInput">
                <option>Абонемент</option>
                <option>Сотрудник</option>
                <option>Арендатор</option>
                <option>VIP</option>
            </select>
        </div>
        <div>
            <div style="font-size:12px; color:#6b7280; margin-bottom:6px;">Действует до</div>
            <input type="date" class="filter-input" id="wlExpireInput">
        </div>
        <button class="btn" id="wlSaveBtn">Сохранить</button>
        <button class="btn btn-secondary" id="wlCancelBtn">Отмена</button>
    </div>
</div>

<div class="table-container">
    <table>
        <thead>
            <tr><th>#</th><th>Гос. номер</th><th>Владелец</th><th>Тип</th><th>Добавлен</th><th>Действует до</th><th>Статус</th><th></th></tr>
        </thead>
        <tbody id="wlTableBody"></tbody>
    </table>
</div>

<script>
let whitelist = [
    {id:1, plate:'М878ВС27', owner:'Петров А.В.', type:'Абонемент', added:'01.03.2026', expires:'31.03.2026', active:true},
    {id:2, plate:'Т496НО28', owner:'Сидорова Е.К.', type:'Сотрудник', added:'15.01.2026', expires:'31.12.2026', active:true},
    {id:3, plate:'О558АТ27', owner:'ООО «Амур-Сервис»', type:'Арендатор', added:'01.02.2026', expires:'01.02.2027', active:true},
    {id:4, plate:'К966СА27', owner:'Иванов И.И.', type:'VIP', added:'10.03.2026', expires:'10.03.2027', active:true},
    {id:5, plate:'С164ЕЕ27', owner:'Морозов Д.С.', type:'Абонемент', added:'01.02.2026', expires:'28.02.2026', active:false},
    {id:6, plate:'У12ТТО27', owner:'Козлова Н.Р.', type:'Абонемент', added:'01.03.2026', expires:'31.03.2026', active:true},
    {id:7, plate:'Р823УК27', owner:'Федотов П.А.', type:'Сотрудник', added:'01.01.2026', expires:'31.12.2026', active:true},
];
let nextId = 8;

function renderWhitelist(data) {
    document.getElementById('wlTableBody').innerHTML = data.map((item,i)=>`
        <tr>
            <td style="color:#6b7280;">${i+1}</td>
            <td><strong style="color:#10b981;">${item.plate}</strong></td>
            <td>${item.owner}</td>
            <td>${item.type}</td>
            <td style="color:#9ca3af;">${item.added}</td>
            <td style="color:#9ca3af;">${item.expires}</td>
            <td>
                <span class="status-badge ${item.active?'status-parking':'status-exit'}">
                    ${item.active?'✅ Активен':'⏱ Истёк'}
                </span>
            </td>
            <td>
                <button class="btn-icon wlDeleteBtn" data-id="${item.id}" title="Удалить из списка">🗑️</button>
            </td>
        </tr>
    `).join('');
    document.querySelectorAll('.wlDeleteBtn').forEach(btn=>{
        btn.addEventListener('click', ()=>{
            if (confirm('Удалить номер из белого списка?')) {
                whitelist = whitelist.filter(w=>w.id!==+btn.dataset.id);
                renderWhitelist(whitelist);
            }
        });
    });
}

document.addEventListener('DOMContentLoaded', ()=>{
    renderWhitelist(whitelist);

    document.getElementById('wlAddBtn').addEventListener('click', ()=>{
        document.getElementById('wlAddForm').style.display='block';
        document.getElementById('wlPlateInput').focus();
    });
    document.getElementById('wlCancelBtn').addEventListener('click', ()=>{
        document.getElementById('wlAddForm').style.display='none';
    });
    document.getElementById('wlSaveBtn').addEventListener('click', ()=>{
        const plate = document.getElementById('wlPlateInput').value.trim().toUpperCase();
        if (!plate) { alert('Введите номер автомобиля'); return; }
        const expires = document.getElementById('wlExpireInput').value;
        whitelist.unshift({
            id: nextId++,
            plate,
            owner: document.getElementById('wlOwnerInput').value.trim() || '—',
            type: document.getElementById('wlTypeInput').value,
            added: new Date().toLocaleDateString('ru-RU'),
            expires: expires ? new Date(expires).toLocaleDateString('ru-RU') : '—',
            active: true,
        });
        renderWhitelist(whitelist);
        document.getElementById('wlAddForm').style.display='none';
        document.getElementById('wlPlateInput').value='';
        document.getElementById('wlOwnerInput').value='';
        document.getElementById('wlExpireInput').value='';
    });
    document.getElementById('wlSearchBtn').addEventListener('click', ()=>{
        const q = document.getElementById('wlSearch').value.trim().toUpperCase();
        renderWhitelist(q ? whitelist.filter(w=>w.plate.includes(q)||w.owner.toUpperCase().includes(q)) : whitelist);
    });
    document.getElementById('wlSearch').addEventListener('keyup', e=>{
        if (e.key==='Enter') document.getElementById('wlSearchBtn').click();
    });
});
</script>
