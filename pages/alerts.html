<div class="filter-bar" style="justify-content:space-between;">
    <div style="display:flex; gap:12px; flex-wrap:wrap;">
        <select class="filter-select" id="alertTypeFilter">
            <option value="all">Все типы</option>
            <option value="entry">Въезд</option>
            <option value="exit">Выезд</option>
            <option value="error">Ошибка</option>
            <option value="payment">Оплата</option>
            <option value="device">Устройство</option>
        </select>
        <select class="filter-select" id="alertSeverityFilter">
            <option value="all">Любой приоритет</option>
            <option value="info">Инфо</option>
            <option value="warning">Предупреждение</option>
            <option value="error">Ошибка</option>
        </select>
        <input type="date" class="filter-input" style="min-width:150px;" value="2026-03-30">
    </div>
    <button class="btn btn-secondary" onclick="renderAlerts(alertsData)">🔄 Обновить</button>
</div>

<!-- Счётчики -->

        <div class="stat-card-change" style="color:#f59e0b;">⚠ требует внимания</div>

    <div class="stat-card">

        <div class="stat-card-value">1</div>
        <div class="stat-card-change" style="color:#ef4444;">🔴 критично</div>

</div>

<div class="table-container">

const severityStyles = {
    info: {badge:'status-parking', label:'Инфо'},
    warning: {badge:'', label:'⚠ Предупреждение', style:'background:rgba(245,158,11,0.15);color:#f59e0b;'},
    error: {badge:'status-exit', label:'🔴 Ошибка'},
};
const typeIcons = {entry:'🚗',exit:'🚙',payment:'💰',error:'⚠️',device:'⚙️'};

function renderAlerts(data) {
    const typeF = document.getElementById('alertTypeFilter').value;
    const sevF = document.getElementById('alertSeverityFilter').value;
    let filtered = data;
    if (typeF!=='all') filtered = filtered.filter(a=>a.type===typeF);
    if (sevF!=='all') filtered = filtered.filter(a=>a.severity===sevF);

    document.getElementById('alertsTableBody').innerHTML = filtered.map(a=>{
        const s = severityStyles[a.severity];
        const badge = s.style
            ? `<span class="status-badge" style="${s.style}">${s.label}</span>`
            : `<span class="status-badge ${s.badge}">${s.label}</span>`;
        return `<tr>
            <td style="color:#9ca3af; font-family:monospace;">${a.time}</td>
            <td>${typeIcons[a.type]} ${a.typeLabel}</td>
            <td>${a.desc}</td>
            <td><strong>${a.plate}</strong></td>
            <td style="color:#9ca3af;">${a.device}</td>
            <td>${badge}</td>
        </tr>`;
    }).join('');
}

document.addEventListener('DOMContentLoaded', ()=>{
    renderAlerts(alertsData);
    document.getElementById('alertTypeFilter').addEventListener('change', ()=>renderAlerts(alertsData));
    document.getElementById('alertSeverityFilter').addEventListener('change', ()=>renderAlerts(alertsData));
});
</script>
